name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: rashmikaog
          outputs: |
            dist/github-snake.svg?color_snake=ffffff&color_dots=#333333,#555555,#888888,#aaaaaa,#ffffff
            dist/github-snake-dark.svg?palette=github-dark&color_snake=ffffff&color_dots=#1a1a1a,#2a2a2a,#444444,#666666,#999999

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
